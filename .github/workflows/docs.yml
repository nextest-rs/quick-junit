on:
  push:
    branches:
      - main

name: Docs

jobs:
  docs:
    name: Build and deploy documentation
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2
      - name: Install just
        uses: taiki-e/install-action@782607f383d1c9d72a26177e2594cd8dad0f3840 # just
      - name: Build rustdocs
        run: just rustdoc
      - name: Organize
        run: |
          rm -rf target/gh-pages
          mkdir target/gh-pages
          echo "/ /rustdoc/quick_junit/ 301" > target/gh-pages/_redirects
          mv target/doc target/gh-pages/rustdoc
      - name: Publish
        uses: cloudflare/pages-action@f0a1cd58cd66095dee69bfa18fa5efd1dde93bca # 1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: quick-junit
          directory: target/gh-pages
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
